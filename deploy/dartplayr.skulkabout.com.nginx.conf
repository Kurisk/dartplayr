server {
    listen 80;
    listen [::]:80;
    server_name dartplayr.skulkabout.com;

    access_log /var/log/nginx/dartplayr.access.log;
    error_log /var/log/nginx/dartplayr.error.log;

    location /static/ {
        alias /var/www/dartplayr/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://unix:/run/dartplayr.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
