server {
    listen 80;
    listen [::]:80;
    server_name dartplayr.skulkabout.com;

    root /var/www/dartplayr;
    index index.html;

    access_log /var/log/nginx/dartplayr.access.log;
    error_log /var/log/nginx/dartplayr.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
